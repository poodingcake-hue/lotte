name: Update Weather Data

on:
  # 구글 앱스 스크립트에서 보내는 신호(google_sheet_update)를 받습니다.
  repository_dispatch:
    types: [google_sheet_update]
    
  schedule:
    - cron: '0 * * * *' # 1시간마다 자동 백업/실행
  workflow_dispatch:      # 수동 실행 버튼 활성화

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Fetch Data
        run: |
          # 2. 기상청 날씨 데이터 업데이트 (weather.json)
          python update_weather.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add frontend/public/weather.json
          
          if ! git diff --cached --quiet; then
            git commit -m "Update weather via KMA API"
            git push
          else
            echo "No changes to commit"
          fi
