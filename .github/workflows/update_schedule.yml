name: Update Lotte Schedule

on:
  schedule:
    # 한국 시간(KST) 기준: 09, 11, 13, 15, 17, 19, 21시 실행
    # UTC 시간 기준: 00, 02, 04, 06, 08, 10, 12시 실행
    - cron: "0 0,2,4,6,8,10,12 * * *"
  workflow_dispatch: # 수동 실행

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리에 푸시할 권한 필요

    steps:
    - name: 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 설정
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install chromium
        python -m playwright install-deps

    - name: 편성표 업데이트 스크립트 실행
      run: python scripts/update_schedule.py

    - name: 변경된 data.json 커밋 및 푸시
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data.json
        # 변경 사항이 있을 때만 커밋
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto update schedule to data.json" && git push)
